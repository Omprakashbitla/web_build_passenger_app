<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/web_build_passenger_app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Passenger App">

  <!-- Theme -->
  <meta name="theme-color" content="#ffffff">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-32.png?v=2"/>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/Icon-16.png?v=2"/>
  <link rel="shortcut icon" href="favicon.png?v=2"/>

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Passenger App">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/Icon-144.png">
  <link rel="apple-touch-icon" sizes="128x128" href="icons/Icon-128.png">
  <link rel="apple-touch-icon" sizes="96x96" href="icons/Icon-96.png">

  <!-- Thumbnail / OG meta (link previews, WhatsApp, Telegram, etc.) -->
  <meta property="og:title" content="Passenger App">
  <meta property="og:description" content="Passenger App">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Passenger App">
  <meta name="twitter:description" content="Passenger App">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <title>Passenger App</title>
  <link rel="manifest" href="manifest.json">

  <!--
    SPA path restore for GitHub Pages.

    Pairs with web/404.html. If the previous page was 404.html it encoded
    the originally-requested path into `?p=/...&q=...`. Decode those back
    into a normal pathname+search+hash and replaceState() so Flutter /
    GoRouter boot at the intended URL instead of the repo root.
  -->
  <script>
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(
          null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>

  <!-- Splash screen styles -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background-color: #ffffff;
      overscroll-behavior-x: none;
      touch-action: pan-y;
      overflow-x: hidden;
    }

    flt-glass-pane, flutter-view, flt-scene-host {
      touch-action: pan-y;
      overscroll-behavior-x: none;
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash-screen img {
      width: 180px;
      height: 180px;
      object-fit: contain;
    }

    @media (min-width: 600px) {
      #splash-screen img {
        width: 220px;
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <!-- Splash screen shown while Flutter loads -->
  <div id="splash-screen">
    <img src="icons/splash_logo.png" alt="Passenger App">
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Remove splash once Flutter app is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(function() {
          splash.remove();
        }, 450);
      }
    });

    // Fallback: remove splash after 5 seconds if flutter-first-frame never fires
    setTimeout(function() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(function() { splash.remove(); }, 450);
      }
    }, 5000);
  </script>
</body>
</html>
